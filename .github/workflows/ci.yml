name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Only the SDK-free unit tests run in CI: they compile the specific source
      # files under test directly (no net48/WinForms/Dataverse SDK), so they run
      # cross-platform on the plain .NET SDK. The net48 tools themselves build on
      # Windows only and are not part of this job.
      - name: Run SDK-free unit tests
        run: dotnet test testing/UnitTests/UnitTests.csproj -c Release --nologo
