name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # The SDK-free unit tests compile the specific source files under test directly
      # (no net48/WinForms/Dataverse SDK), so they run cross-platform on the plain
      # .NET SDK. The Dataverse-SDK-dependent suites (net48) run in test-windows below.
      - name: Run SDK-free unit tests
        run: dotnet test testing/UnitTests/UnitTests.csproj -c Release --nologo

  test-windows:
    name: test-windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Windows runs all three suites so a single required check covers every framework:
      # the net8 SDK-free tests (also validated cross-platform by the ubuntu `test` job)
      # plus the net48 suites, which reference the Dataverse SDK (Microsoft.Xrm.Sdk) and
      # the net48 export libraries (ClosedXML, PdfSharp/MigraDoc-GDI) and so need the 4.8
      # targeting pack that ships on windows-latest. All run headlessly — no live org
      # (fake IOrganizationService) and no XrmToolBox host.
      - name: Run SDK-free unit tests
        run: dotnet test testing/UnitTests/UnitTests.csproj -c Release --nologo

      - name: Run analyzer tests (fake IOrganizationService)
        run: dotnet test testing/AnalyzerTests/AnalyzerTests.csproj -c Release --nologo

      - name: Run report exporter tests
        run: dotnet test testing/ReportTests/ReportTests.csproj -c Release --nologo
