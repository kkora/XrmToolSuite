name: UI smoke (self-hosted)

# Tier-3 FlaUI UI smoke test — drives the REAL XrmToolBox host and asserts every suite plugin loads.
# Runs on a self-hosted Windows runner because it needs an interactive, unlocked desktop session
# (UI Automation cannot drive a headless/service session). See testing/UiSmokeTests/README.md.
#
# Manual trigger only: an interactive GUI test should not fire on every push (it takes over the runner's
# mouse/keyboard focus). Add a `schedule:` or `push:` trigger only if you dedicate an always-on runner.
on:
  workflow_dispatch:
    inputs:
      xtb_exe:
        description: "Full path to XrmToolBox.exe (overrides the repo variable / default)"
        required: false
        default: ""

jobs:
  ui-smoke:
    name: ui-smoke
    runs-on: [self-hosted, windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Build every tool and copy the DLLs into XrmToolBox's Plugins folder so the host loads THIS build.
      # Requires the .NET Framework 4.8 targeting pack on the runner (the tools are net48/WinForms).
      - name: Build + deploy tools to XrmToolBox
        run: dotnet build XrmToolSuite.sln -c Release -p:DeployToXTB=true --nologo

      - name: Unblock deployed plugins
        shell: pwsh
        run: Get-ChildItem "$env:APPDATA\MscrmTools\XrmToolBox\Plugins\XrmToolSuite.*.dll" | Unblock-File

      # Launches XrmToolBox via FlaUI and asserts all suite tools appear in the Tools list (no org needed).
      # By default this DOWNLOADS the official XrmToolBox release that matches the version the tools build
      # against (XrmToolBoxPackage in src/Tools/Directory.Build.props), so the job is self-contained and does
      # not depend on any preinstalled/local copy. To use a preinstalled XrmToolBox instead, set the repo
      # variable XTB_EXE (Settings -> Secrets and variables -> Actions -> Variables) or pass xtb_exe on dispatch.
      - name: Run UI smoke test
        shell: pwsh
        env:
          XTB_OVERRIDE: ${{ github.event.inputs.xtb_exe != '' && github.event.inputs.xtb_exe || vars.XTB_EXE }}
          UISMOKE_SCREENSHOT_DIR: ${{ runner.temp }}\ui-smoke-shots
        run: |
          $exe = $env:XTB_OVERRIDE
          if (-not $exe) {
            $ver = (Select-Xml -Path src/Tools/Directory.Build.props -XPath "//PackageReference[@Include='XrmToolBoxPackage']").Node.Version
            Write-Host "Downloading official XrmToolBox v$ver (matches XrmToolBoxPackage)…"
            $dir = Join-Path $env:RUNNER_TEMP "xtb"
            New-Item -ItemType Directory -Force $dir | Out-Null
            $zip = Join-Path $dir "XrmToolbox.zip"
            Invoke-WebRequest "https://github.com/MscrmTools/XrmToolBox/releases/download/v$ver/XrmToolbox.zip" -OutFile $zip -UseBasicParsing
            Expand-Archive -Path $zip -DestinationPath $dir -Force
            $exe = (Get-ChildItem $dir -Recurse -Filter XrmToolBox.exe | Select-Object -First 1).FullName
          }
          if (-not $exe) { throw "Could not resolve XrmToolBox.exe (download failed and no XTB_EXE override set)." }
          Write-Host "XTB_EXE=$exe"
          $env:XTB_EXE = $exe
          dotnet test testing/UiSmokeTests/UiSmokeTests.csproj -c Release --nologo

      # Attach the captured screenshot (taken on pass AND fail) so a missing-tool run is diagnosable in CI.
      - name: Upload UI screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-screenshots
          path: ${{ runner.temp }}\ui-smoke-shots\*.png
          if-no-files-found: warn
